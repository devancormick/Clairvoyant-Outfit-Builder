kind = "web"
previewPath = "/"
title = "Clairvoyant"
version = "1.0.0"
id = "artifacts/clairvoyant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23437

[services.development]
run = "pnpm --filter @workspace/clairvoyant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clairvoyant", "run", "build" ]
publicDir = "artifacts/clairvoyant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23437"
BASE_PATH = "/"
